<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI & Calorie Calculator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #1a1a2e;
  }
  .container {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 520px;
    overflow: hidden;
  }
  .tabs { display: flex; background: #f0f0f5; }
  .tab {
    flex: 1;
    padding: 18px;
    text-align: center;
    font-weight: 600;
    cursor: pointer;
    color: #888;
    transition: all 0.3s;
    border: none;
    background: none;
    font-size: 16px;
  }
  .tab.active { background: #fff; color: #764ba2; box-shadow: 0 -3px 0 #764ba2 inset; }
  .panel { padding: 32px; display: none; animation: fade 0.4s; }
  .panel.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  h1 { font-size: 22px; margin-bottom: 6px; }
  .sub { color: #999; font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-weight: 600; margin: 16px 0 8px; font-size: 14px; }
  input, select {
    width: 100%;
    padding: 14px;
    border: 2px solid #e0e0eb;
    border-radius: 12px;
    font-size: 16px;
    transition: border 0.2s;
  }
  input:focus, select:focus { outline: none; border-color: #764ba2; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .gender { display: flex; gap: 12px; }
  .gender button {
    flex: 1; padding: 14px; border: 2px solid #e0e0eb; border-radius: 12px;
    background: #fff; cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.2s;
  }
  .gender button.active { border-color: #764ba2; background: #f3eefc; color: #764ba2; }
  .btn {
    width: 100%; padding: 16px; margin-top: 24px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    font-size: 17px; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(118,75,162,0.4); }
  .btn:active { transform: translateY(0); }
  .result { margin-top: 28px; text-align: center; display: none; }
  .result.show { display: block; animation: fade 0.4s; }
  .big { font-size: 48px; font-weight: 800; }
  .badge { display: inline-block; padding: 6px 18px; border-radius: 20px; font-weight: 700; margin-top: 8px; color: #fff; }
  .bar { height: 14px; border-radius: 7px; margin: 20px 0 8px; background: linear-gradient(to right, #3498db, #2ecc71, #f1c40f, #e67e22, #e74c3c); position: relative; }
  .marker { position: absolute; top: -6px; width: 26px; height: 26px; background: #fff; border: 4px solid #1a1a2e; border-radius: 50%; transform: translateX(-50%); transition: left 0.6s ease; }
  .scale { display: flex; justify-content: space-between; font-size: 11px; color: #999; }
  .info { background: #f7f7fb; border-radius: 12px; padding: 16px; margin-top: 18px; text-align: left; font-size: 14px; line-height: 1.7; }
  .cal-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
  .cal-card { background: #f7f7fb; border-radius: 14px; padding: 16px 8px; text-align: center; }
  .cal-card .v { font-size: 22px; font-weight: 800; color: #764ba2; }
  .cal-card .l { font-size: 12px; color: #888; margin-top: 4px; }
  .tdee { font-size: 40px; font-weight: 800; color: #764ba2; }
</style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('bmi')">BMI Calculator</button>
    <button class="tab" onclick="switchTab('cal')">Calorie Calculator</button>
  </div>

  <!-- BMI PANEL -->
  <div class="panel active" id="bmi">
    <h1>Body Mass Index</h1>
    <div class="sub">Metric units (cm / kg)</div>
    <div class="row">
      <div>
        <label>Height (cm)</label>
        <input type="number" id="bHeight" placeholder="180" value="180">
      </div>
      <div>
        <label>Weight (kg)</label>
        <input type="number" id="bWeight" placeholder="65" value="65">
      </div>
    </div>
    <button class="btn" onclick="calcBMI()">Calculate BMI</button>
    <div class="result" id="bmiResult">
      <div class="big" id="bmiValue">--</div>
      <div class="badge" id="bmiBadge">--</div>
      <div class="bar"><div class="marker" id="bmiMarker" style="left:50%"></div></div>
      <div class="scale"><span>15</span><span>18.5</span><span>25</span><span>30</span><span>40</span></div>
      <div class="info" id="bmiInfo"></div>
    </div>
  </div>

  <!-- CALORIE PANEL -->
  <div class="panel" id="cal">
    <h1>Daily Calorie Needs</h1>
    <div class="sub">Mifflin–St Jeor equation · Metric</div>
    <label>Gender</label>
    <div class="gender">
      <button id="male" class="active" onclick="setGender('male')">Male</button>
      <button id="female" onclick="setGender('female')">Female</button>
    </div>
    <div class="row">
      <div><label>Age</label><input type="number" id="cAge" value="25"></div>
      <div><label>Height (cm)</label><input type="number" id="cHeight" value="180"></div>
      <div><label>Weight (kg)</label><input type="number" id="cWeight" value="65"></div>
    </div>
    <label>Activity Level</label>
    <select id="cActivity">
      <option value="1.2">Sedentary (little or no exercise)</option>
      <option value="1.375">Light (exercise 1–3 days/week)</option>
      <option value="1.55" selected>Moderate (exercise 3–5 days/week)</option>
      <option value="1.725">Active (exercise 6–7 days/week)</option>
      <option value="1.9">Very active (hard exercise / physical job)</option>
    </select>
    <button class="btn" onclick="calcCal()">Calculate Calories</button>
    <div class="result" id="calResult">
      <div class="sub" style="margin:0">Maintenance (TDEE)</div>
      <div class="tdee" id="tdeeValue">--</div>
      <div class="sub" style="margin-top:4px">calories / day</div>
      <div class="cal-grid">
        <div class="cal-card"><div class="v" id="loseVal">--</div><div class="l">Lose weight<br>(-0.5 kg/wk)</div></div>
        <div class="cal-card"><div class="v" id="maintainVal">--</div><div class="l">Maintain</div></div>
        <div class="cal-card"><div class="v" id="gainVal">--</div><div class="l">Gain weight<br>(+0.5 kg/wk)</div></div>
      </div>
      <div class="info" id="calInfo"></div>
    </div>
  </div>
</div>

<script>
  let gender = 'male';
  function switchTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(id).classList.add('active');
  }
  function setGender(g) {
    gender = g;
    document.getElementById('male').classList.toggle('active', g === 'male');
    document.getElementById('female').classList.toggle('active', g === 'female');
  }
  function calcBMI() {
    const h = parseFloat(document.getElementById('bHeight').value) / 100;
    const w = parseFloat(document.getElementById('bWeight').value);
    if (!h || !w || h <= 0 || w <= 0) { alert('Please enter valid height and weight.'); return; }
    const bmi = w / (h * h);
    let cat, color;
    if (bmi < 18.5) { cat = 'Underweight'; color = '#3498db'; }
    else if (bmi < 25) { cat = 'Normal'; color = '#2ecc71'; }
    else if (bmi < 30) { cat = 'Overweight'; color = '#f1c40f'; }
    else if (bmi < 35) { cat = 'Obese (Class I)'; color = '#e67e22'; }
    else { cat = 'Obese (Class II+)'; color = '#e74c3c'; }
    document.getElementById('bmiValue').textContent = bmi.toFixed(1);
    const badge = document.getElementById('bmiBadge');
    badge.textContent = cat; badge.style.background = color;
    let pct = ((bmi - 15) / (40 - 15)) * 100;
    pct = Math.max(0, Math.min(100, pct));
    document.getElementById('bmiMarker').style.left = pct + '%';
    const minW = (18.5 * h * h).toFixed(1);
    const maxW = (24.9 * h * h).toFixed(1);
    document.getElementById('bmiInfo').innerHTML =
      '<b>Healthy BMI range:</b> 18.5 – 24.9 kg/m²<br>' +
      '<b>Healthy weight for your height:</b> ' + minW + ' – ' + maxW + ' kg';
    document.getElementById('bmiResult').classList.add('show');
  }
  function calcCal() {
    const age = parseFloat(document.getElementById('cAge').value);
    const h = parseFloat(document.getElementById('cHeight').value);
    const w = parseFloat(document.getElementById('cWeight').value);
    const act = parseFloat(document.getElementById('cActivity').value);
    if (!age || !h || !w) { alert('Please fill in all fields.'); return; }
    let bmr = 10 * w + 6.25 * h - 5 * age + (gender === 'male' ? 5 : -161);
    const tdee = bmr * act;
    document.getElementById('tdeeValue').textContent = Math.round(tdee);
    document.getElementById('loseVal').textContent = Math.round(tdee - 500);
    document.getElementById('maintainVal').textContent = Math.round(tdee);
    document.getElementById('gainVal').textContent = Math.round(tdee + 500);
    document.getElementById('calInfo').innerHTML =
      '<b>BMR (at rest):</b> ' + Math.round(bmr) + ' cal/day<br>' +
      '<b>TDEE (with activity):</b> ' + Math.round(tdee) + ' cal/day<br>' +
      'A deficit/surplus of ~500 cal/day ≈ 0.5 kg change per week.';
    document.getElementById('calResult').classList.add('show');
  }
</script>
</body>
</html>
